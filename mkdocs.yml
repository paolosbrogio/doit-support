site_name: DoiT Support
site_description: Documentazione del framework DoiT (CMS data-oriented in VB.NET + Angular)
site_author: Paolo Sbrogiò
site_url: https://paolosbrogio.github.io/doit-support/

repo_name: paolosbrogio/doit-support
repo_url: https://github.com/paolosbrogio/doit-support
edit_uri: edit/main/docs/

theme:
  name: material
  language: it
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Tema scuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Tema chiaro
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Link a questa sezione
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang:
        - it
        - en
  - awesome-pages

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/paolosbrogio
  generator: false

copyright: |
  &copy; 2026 Paolo Sbrogiò - DoiT framework
